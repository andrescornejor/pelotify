<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pelotify - Estadísticas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;0,700;0,900;1,700;1,900&display=swap');
    
    body {
      font-family: 'Kanit', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0a0a0a 0%, #111111 50%, #0a0a0a 100%);
      color: #ffffff;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    
    .widget-container {
      width: 100%;
      height: 100vh;
      max-height: 200px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    
    .widget-container::before {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 60%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .widget-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .widget-logo {
      width: 20px;
      height: 20px;
      border-radius: 6px;
    }
    
    .widget-title {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }
    
    .player-overall {
      font-size: 28px;
      font-weight: 900;
      font-style: italic;
      color: #2cfc7d;
      line-height: 1;
      text-shadow: 0 0 30px rgba(44,252,125,0.2);
    }
    
    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .player-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(44,252,125,0.3);
    }
    
    .player-avatar-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(44,252,125,0.1);
      border: 2px solid rgba(44,252,125,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .player-name {
      font-size: 14px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    
    .player-rank {
      font-size: 10px;
      color: #2cfc7d;
      font-weight: 700;
      margin-top: 2px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    
    .stat-item {
      text-align: center;
      padding: 6px 2px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .stat-value {
      font-size: 13px;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      color: #ffffff;
    }
    
    .stat-value.high { color: #2cfc7d; }
    .stat-value.mid { color: #f59e0b; }
    .stat-value.low { color: #f43f5e; }
    
    .stat-label {
      font-size: 6px;
      color: rgba(255,255,255,0.3);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 2px;
    }
    
    .meta-stats {
      display: flex;
      gap: 12px;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }
    
    .meta-stats span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .skeleton { background: rgba(255,255,255,0.05); border-radius: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="widget-container" id="widget" onclick="openProfile()">
    <div class="widget-header">
      <div class="widget-header-left">
        <img src="/icon-192.png" alt="Pelotify" class="widget-logo">
        <span class="widget-title">Mi Carta</span>
      </div>
      <div class="player-overall" id="overall">--</div>
    </div>
    
    <div id="content">
      <div class="player-info">
        <div class="skeleton" style="width: 36px; height: 36px; border-radius: 10px;"></div>
        <div>
          <div class="skeleton" style="width: 100px; height: 16px; margin-bottom: 4px;"></div>
          <div class="skeleton" style="width: 60px; height: 12px;"></div>
        </div>
      </div>
      <div class="stats-grid" style="margin-top: 8px;">
        <div class="skeleton" style="height: 36px;"></div>
        <div class="skeleton" style="height: 36px;"></div>
        <div class="skeleton" style="height: 36px;"></div>
        <div class="skeleton" style="height: 36px;"></div>
        <div class="skeleton" style="height: 36px;"></div>
        <div class="skeleton" style="height: 36px;"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = location.origin;
    
    function getStatClass(value) {
      if (value >= 75) return 'high';
      if (value >= 50) return 'mid';
      return 'low';
    }
    
    async function loadWidgetData() {
      try {
        const userId = localStorage.getItem('pelotify_widget_userId') || '';
        const url = `${BASE_URL}/api/widgets/data?type=stats${userId ? `&userId=${userId}` : ''}`;
        
        const res = await fetch(url, { cache: 'no-store' });
        const data = await res.json();
        
        const stats = data.stats;
        const contentEl = document.getElementById('content');
        const overallEl = document.getElementById('overall');
        
        if (!stats) {
          contentEl.innerHTML = `<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);font-size:11px;">Sin datos</div>`;
          return;
        }
        
        overallEl.textContent = stats.overall;
        
        const avatarHtml = stats.iconUrl && !stats.iconUrl.includes('icon-192')
          ? `<img src="${stats.iconUrl}" alt="" class="player-avatar">`
          : `<div class="player-avatar-placeholder">⚽</div>`;
        
        contentEl.innerHTML = `
          <div class="player-info">
            ${avatarHtml}
            <div>
              <div class="player-name">${stats.playerName}</div>
              <div class="player-rank">${stats.rank}</div>
            </div>
          </div>
          
          <div class="stats-grid">
            ${[
              { label: 'PAC', value: stats.pac },
              { label: 'SHO', value: stats.sho },
              { label: 'PAS', value: stats.pas },
              { label: 'DRI', value: stats.dri },
              { label: 'DEF', value: stats.def },
              { label: 'PHY', value: stats.phy },
            ].map(s => `
              <div class="stat-item">
                <div class="stat-value ${getStatClass(s.value)}">${s.value}</div>
                <div class="stat-label">${s.label}</div>
              </div>
            `).join('')}
          </div>
          
          <div class="meta-stats">
            <span>⚽ ${stats.matches} partidos</span>
            <span>📈 ${stats.winRate}% win</span>
          </div>
        `;
      } catch (err) {
        console.error('Widget error:', err);
      }
    }
    
    function openProfile() {
      window.open(`${BASE_URL}/profile/me`, '_blank');
    }
    
    loadWidgetData();
    setInterval(loadWidgetData, 5 * 60 * 1000);
  </script>
</body>
</html>
