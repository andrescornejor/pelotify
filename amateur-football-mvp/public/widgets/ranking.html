<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pelotify - Mi Ranking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;0,700;0,900;1,700;1,900&display=swap');
    
    body {
      font-family: 'Kanit', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0a0a0a 0%, #111111 50%, #0a0a0a 100%);
      color: #ffffff;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    
    .widget-container {
      width: 100%;
      height: 100vh;
      max-height: 200px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    
    .widget-container::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 50%;
      height: 70%;
      background: radial-gradient(circle, rgba(44, 252, 125, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .widget-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .widget-logo {
      width: 20px;
      height: 20px;
      border-radius: 6px;
    }
    
    .widget-title {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }
    
    .rank-display {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }
    
    .rank-emoji {
      font-size: 32px;
      line-height: 1;
    }
    
    .rank-info {
      flex: 1;
    }
    
    .rank-name {
      font-size: 20px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    
    .rank-elo {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      font-weight: 700;
      margin-top: 2px;
    }
    
    .rank-progress-value {
      font-size: 24px;
      font-weight: 900;
      font-style: italic;
      color: #2cfc7d;
      line-height: 1;
      text-shadow: 0 0 20px rgba(44,252,125,0.3);
    }
    
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #2cfc7d, #5dfd9d);
      transition: width 1s ease-out;
      position: relative;
    }
    
    .progress-bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      color: rgba(255,255,255,0.3);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }
    
    .quick-stats {
      display: flex;
      gap: 8px;
    }
    
    .quick-stat {
      flex: 1;
      text-align: center;
      padding: 6px 4px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .quick-stat-value {
      font-size: 14px;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
    }
    
    .quick-stat-value.gold { color: #f59e0b; }
    .quick-stat-value.green { color: #2cfc7d; }
    .quick-stat-value.red { color: #f43f5e; }
    
    .quick-stat-label {
      font-size: 7px;
      color: rgba(255,255,255,0.3);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }
    
    .skeleton { background: rgba(255,255,255,0.05); border-radius: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="widget-container" id="widget" onclick="openRanks()">
    <div class="widget-header">
      <img src="/icon-192.png" alt="Pelotify" class="widget-logo">
      <span class="widget-title">Mi Ranking</span>
    </div>
    
    <div id="content">
      <div class="rank-display">
        <div class="skeleton" style="width: 40px; height: 40px; border-radius: 10px;"></div>
        <div style="flex:1">
          <div class="skeleton" style="width: 100px; height: 20px; margin-bottom: 4px;"></div>
          <div class="skeleton" style="width: 60px; height: 12px;"></div>
        </div>
      </div>
      <div class="skeleton" style="width: 100%; height: 6px;"></div>
    </div>
  </div>

  <script>
    const BASE_URL = location.origin;
    
    async function loadWidgetData() {
      try {
        const userId = localStorage.getItem('pelotify_widget_userId') || '';
        const url = `${BASE_URL}/api/widgets/data?type=ranking${userId ? `&userId=${userId}` : ''}`;
        
        const res = await fetch(url, { cache: 'no-store' });
        const data = await res.json();
        
        const ranking = data.ranking;
        const contentEl = document.getElementById('content');
        
        if (!ranking) {
          contentEl.innerHTML = `<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);font-size:11px;">Sin datos de ranking</div>`;
          return;
        }
        
        contentEl.innerHTML = `
          <div class="rank-display">
            <div class="rank-emoji">${ranking.rankEmoji}</div>
            <div class="rank-info">
              <div class="rank-name">${ranking.rank}</div>
              <div class="rank-elo">ELO: ${ranking.elo}</div>
            </div>
            <div class="rank-progress-value">${ranking.progress}%</div>
          </div>
          
          <div>
            <div class="progress-bar-container">
              <div class="progress-bar-fill" style="width: ${ranking.progress}%"></div>
            </div>
            <div class="progress-label">
              <span>Progreso</span>
              <span>Siguiente: ${ranking.nextRank}</span>
            </div>
          </div>
          
          <div class="quick-stats">
            <div class="quick-stat">
              <div class="quick-stat-value gold">${ranking.mvps}</div>
              <div class="quick-stat-label">MVPs</div>
            </div>
            <div class="quick-stat">
              <div class="quick-stat-value green">${ranking.wins}</div>
              <div class="quick-stat-label">Victorias</div>
            </div>
            <div class="quick-stat">
              <div class="quick-stat-value red">${ranking.streak}</div>
              <div class="quick-stat-label">Racha</div>
            </div>
          </div>
        `;
      } catch (err) {
        console.error('Widget error:', err);
      }
    }
    
    function openRanks() {
      window.open(`${BASE_URL}/ranks`, '_blank');
    }
    
    loadWidgetData();
    setInterval(loadWidgetData, 5 * 60 * 1000);
  </script>
</body>
</html>
